<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OEE Production EN-Plating (Working Days Update)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700;800&display=swap');
        body { 
            font-family: 'Sarabun', sans-serif; 
            background-color: #f1f5f9;
            background-image: radial-gradient(#cbd5e1 1px, transparent 1px);
            background-size: 32px 32px;
        }
        input[type=number]::-webkit-inner-spin-button, 
        input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        
        @keyframes gradient-x {
            0%, 100% { background-size: 200% 200%; background-position: left center; }
            50% { background-size: 200% 200%; background-position: right center; }
        }
        .animate-gradient-x { animation: gradient-x 3s ease infinite; }
        @keyframes fade-in-up {
            0% { opacity: 0; transform: translateY(30px) scale(0.95); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }
        .animate-fade-in-up { animation: fade-in-up 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards; opacity: 0; }
        .glass-card { 
            @apply bg-white/80 backdrop-blur-xl border border-white/60 shadow-[0_8px_30px_rgb(0,0,0,0.04)] transition-all duration-500 hover:shadow-[0_15px_40px_rgb(0,0,0,0.12)] hover:-translate-y-1 relative overflow-hidden; 
        }
        .chart-glow { filter: drop-shadow(0px 8px 12px rgba(0, 0, 0, 0.08)); }
        @keyframes scan-progress { 0% { width: 0%; } 100% { width: 100%; } }
        .animate-scan-progress { animation: scan-progress 10s linear infinite; }
        .animate-scan-progress-pie { animation: scan-progress 6s linear infinite; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/prop-types@15.8.1/prop-types.min.js"></script>
    <script src="https://unpkg.com/recharts@2.12.7/umd/Recharts.js"></script>
    <script src="https://unpkg.com/lucide@0.453.0/dist/umd/lucide.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;
        const { 
            BarChart, Bar, Cell, XAxis, YAxis, CartesianGrid, Tooltip, 
            ResponsiveContainer, ReferenceLine, LabelList, Legend, Line, ComposedChart,
            PieChart, Pie, Sector, Area 
        } = window.Recharts;

        const Icon = ({ name, size = 24, className = "", style = {} }) => {
            const iconData = window.lucide.icons[name];
            if (!iconData) return null;
            const [tag, attrs, children] = iconData;
            return (
                <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className} style={style}
                    dangerouslySetInnerHTML={{
                        __html: children.map(([childTag, childAttrs]) => {
                            const attrString = Object.entries(childAttrs).map(([key, value]) => `${key}="${value}"`).join(' ');
                            return `<${childTag} ${attrString}></${childTag}>`;
                        }).join('')
                    }}
                />
            );
        };

        const AnimatedNumber = ({ value, formatter, duration = 1500 }) => {
            const [displayValue, setDisplayValue] = useState(0);
            useEffect(() => {
                let startTime = null;
                let animationFrameId;
                const animate = (timestamp) => {
                    if (!startTime) startTime = timestamp;
                    const progress = Math.min((timestamp - startTime) / duration, 1);
                    const easeProgress = 1 - Math.pow(1 - progress, 4);
                    setDisplayValue(value * easeProgress);
                    if (progress < 1) animationFrameId = requestAnimationFrame(animate);
                    else setDisplayValue(value);
                };
                animationFrameId = requestAnimationFrame(animate);
                return () => cancelAnimationFrame(animationFrameId);
            }, [value, duration]);
            return <span>{formatter(displayValue)}</span>;
        };

        const App = () => {
            const months = ["มกราคม", "กุมภาพันธ์", "มีนาคม", "เมษายน", "พฤษภาคม", "มิถุนายน", "กรกฎาคม", "สิงหาคม", "กันยายน", "ตุลาคม", "พฤศจิกายน", "ธันวาคม"];
            const monthAbbr = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];
            const fileInputRef = useRef(null);

            const createEmptyYearData = () => {
                const yearData = {};
                months.forEach(m => {
                    yearData[m] = {
                        monthlySummary: { oee: 0, output: 0, ngRate: 0, ngQty: 0, workingDays: 0, ngBreakdown: [] }
                    };
                });
                return yearData;
            };

            const getLatestMonthWithData = (dataToScan) => {
                for (let i = months.length - 1; i >= 0; i--) {
                    const m = months[i];
                    const summary = dataToScan[m].monthlySummary;
                    if (summary.output > 0 || summary.oee > 0 || summary.ngQty > 0) return m;
                }
                return months[new Date().getMonth()]; 
            };

            const [selectedMonth, setSelectedMonth] = useState(() => months[new Date().getMonth()]);
            const [fullYearData, setFullYearData] = useState(createEmptyYearData());
            const [targets, setTargets] = useState({ oee: 90.0, ng: 1.0 });
            const [message, setMessage] = useState(null);
            const [overallNgRate, setOverallNgRate] = useState(0);
            const [overallOee, setOverallOee] = useState(0);
            const [showInputPanel, setShowInputPanel] = useState(true);
            const [isFullscreen, setIsFullscreen] = useState(false);
            const [autoPlayIndex, setAutoPlayIndex] = useState(0);
            const [pieAutoPlayIndex, setPieAutoPlayIndex] = useState(0);

            useEffect(() => {
                try {
                    const savedData = localStorage.getItem('oeeDashboardData');
                    if (savedData) {
                        const parsed = JSON.parse(savedData);
                        if (parsed.fullYearData) {
                            setFullYearData(parsed.fullYearData);
                            setSelectedMonth(getLatestMonthWithData(parsed.fullYearData));
                        }
                        if (parsed.targets) setTargets(parsed.targets);
                        if (parsed.overallNgRate !== undefined) setOverallNgRate(parsed.overallNgRate);
                        if (parsed.overallOee !== undefined) setOverallOee(parsed.overallOee);
                    }
                } catch (e) { console.error("Failed to load data", e); }
            }, []);

            useEffect(() => {
                const timer = setInterval(() => setAutoPlayIndex(prev => prev + 1), 10000);
                return () => clearInterval(timer);
            }, []);

            useEffect(() => {
                const timer = setInterval(() => setPieAutoPlayIndex(prev => prev + 1), 6000);
                return () => clearInterval(timer);
            }, []);

            // Escape key listener for the simulated fullscreen mode
            useEffect(() => {
                const handleKeyDown = (e) => {
                    if (e.key === 'Escape' && isFullscreen) {
                        setIsFullscreen(false);
                    }
                };
                window.addEventListener('keydown', handleKeyDown);
                return () => window.removeEventListener('keydown', handleKeyDown);
            }, [isFullscreen]);

            // Removed native requestFullscreen because of iframe permissions policy
            const toggleFullscreen = () => {
                setIsFullscreen(!isFullscreen);
            };

            const currentData = useMemo(() => fullYearData[selectedMonth], [fullYearData, selectedMonth]);

            const annualChartData = useMemo(() => {
                const data = months.map((m, idx) => ({
                    name: m,
                    shortName: monthAbbr[idx],
                    oee: fullYearData[m].monthlySummary.oee || 0,
                    output: fullYearData[m].monthlySummary.output || 0,
                    ngRate: fullYearData[m].monthlySummary.ngRate || 0,
                    ngQty: fullYearData[m].monthlySummary.ngQty || 0,
                    workingDays: fullYearData[m].monthlySummary.workingDays || 0,
                    isTotal: false
                }));
                let totalOutput = 0; let totalNgQty = 0;
                data.forEach(d => { totalOutput += d.output; totalNgQty += d.ngQty; });
                const totalNgRate = totalOutput > 0 ? (totalNgQty / totalOutput) * 100 : 0;
                data.push({ name: "รวมทั้งปี", shortName: "Total", oee: 0, output: totalOutput, ngRate: totalNgRate, ngQty: totalNgQty, isTotal: true });
                return data;
            }, [fullYearData]);

            const yearlyOeeData = annualChartData.filter(d => !d.isTotal);
            const scannableYearlyIndices = yearlyOeeData.map((d, i) => (d.output > 0 || d.oee > 0) ? i : -1).filter(i => i !== -1);
            const yearlyOeeIndex = scannableYearlyIndices.length > 0 ? scannableYearlyIndices[autoPlayIndex % scannableYearlyIndices.length] : 0;

            const scannableNgIndices = annualChartData.map((d, i) => (d.output > 0 || d.ngQty > 0 || d.isTotal) ? i : -1).filter(i => i !== -1);
            const yearlyNgIndex = scannableNgIndices.length > 0 ? scannableNgIndices[autoPlayIndex % scannableNgIndices.length] : 0;

            const pieData = currentData.monthlySummary.ngBreakdown ? currentData.monthlySummary.ngBreakdown.filter(d => d.value > 0) : [];
            const pieIndex = pieData.length > 0 ? pieAutoPlayIndex % pieData.length : 0;

            const handleFileUpload = (e) => {
                const file = e.target.files[0]; if (!file) return;
                const reader = new FileReader();
                reader.onload = (evt) => {
                    try {
                        const bstr = evt.target.result;
                        const wb = XLSX.read(bstr, { type: 'binary' });
                        const newYearData = { ...fullYearData };
                        const summaryWs = wb.Sheets["Summary monthly"];
                        const ngTypesConfig = [
                            { name: 'Product lost', col: 'G' }, { name: 'QC Semple', col: 'H' }, { name: 'Test Thickness', col: 'I' },
                            { name: 'Dent (Handling)', col: 'J' }, { name: 'Stain', col: 'K' }, { name: 'Plating abnormal', col: 'L' },
                            { name: 'Blister', col: 'M' }, { name: 'Barrel not rotate', col: 'N' }, { name: 'Thickness out spec', col: 'O' }
                        ];
                        if (summaryWs) {
                            const findRowByMonthName = (ws, col, mAbbr, startRow, endRow) => {
                                const target = mAbbr.toLowerCase();
                                for (let r = startRow; r <= endRow; r++) {
                                    const cell = ws[`${col}${r}`];
                                    if (cell) {
                                        const cellText = cell.w ? String(cell.w).trim().toLowerCase() : String(cell.v).trim().toLowerCase();
                                        if (cellText.startsWith(target)) return r;
                                    }
                                }
                                return -1;
                            };
                            months.forEach((m, idx) => {
                                const mAbbr = monthAbbr[idx];
                                let oeeRow = findRowByMonthName(summaryWs, 'A', mAbbr, 2, 20);
                                if (oeeRow === -1) oeeRow = findRowByMonthName(summaryWs, 'B', mAbbr, 2, 20);
                                if (oeeRow === -1) oeeRow = 3 + idx;
                                
                                let ngRow = findRowByMonthName(summaryWs, 'A', mAbbr, 30, 60);
                                if (ngRow === -1) ngRow = 34 + idx;
                                
                                const oeeVal = summaryWs[`C${oeeRow}`]?.v || 0;
                                const workingDaysVal = summaryWs[`F${oeeRow}`]?.v || 0;
                                const outputVal = summaryWs[`B${ngRow}`]?.v || 0;
                                const qtyVal = summaryWs[`E${ngRow}`]?.v || 0;
                                const rateVal = summaryWs[`F${ngRow}`]?.v || 0;

                                newYearData[m].monthlySummary.oee = Math.round((oeeVal <= 1 ? oeeVal * 100 : oeeVal) * 100) / 100;
                                newYearData[m].monthlySummary.workingDays = workingDaysVal;
                                newYearData[m].monthlySummary.output = outputVal;
                                newYearData[m].monthlySummary.ngQty = qtyVal;
                                newYearData[m].monthlySummary.ngRate = Math.round((rateVal <= 1 ? rateVal * 100 : rateVal) * 100) / 100;
                                newYearData[m].monthlySummary.ngBreakdown = ngTypesConfig.map(type => ({ name: type.name, value: summaryWs[`${type.col}${ngRow}`]?.v || 0 }));
                            });
                            setOverallNgRate(Math.round((summaryWs['P51']?.v || 0) * (summaryWs['P51']?.v <= 1 ? 100 : 1) * 100) / 100);
                            setOverallOee(Math.round((summaryWs['C15']?.v || 0) * (summaryWs['C15']?.v <= 1 ? 100 : 1) * 100) / 100);
                        }
                        setFullYearData(newYearData);
                        setSelectedMonth(getLatestMonthWithData(newYearData));
                        setMessage({ type: 'success', text: `นำเข้าข้อมูลสำเร็จ!` });
                        setTimeout(() => setMessage(null), 3000);
                    } catch (err) { setMessage({ type: 'error', text: 'รูปแบบไฟล์ไม่ถูกต้อง' }); }
                };
                reader.readAsBinaryString(file);
            };

            const handleSaveData = () => {
                const dataToSave = { fullYearData, targets, overallNgRate, overallOee };
                try { localStorage.setItem('oeeDashboardData', JSON.stringify(dataToSave)); setMessage({ type: 'success', text: 'บันทึกข้อมูลเรียบร้อยแล้ว' }); }
                catch (e) { setMessage({ type: 'error', text: 'ไม่สามารถบันทึกได้' }); }
                setTimeout(() => setMessage(null), 3000);
            };

            const updateSpecificMonthData = (month, field, value) => {
                const numVal = (field === 'output' || field === 'ngQty' || field === 'workingDays') ? (parseInt(value) || 0) : (parseFloat(value) || 0);
                setFullYearData(prev => ({ ...prev, [month]: { ...prev[month], monthlySummary: { ...prev[month].monthlySummary, [field]: numVal } } }));
            };

            const formatNumber = (num) => new Intl.NumberFormat().format(Math.round(num));
            const toFixed2 = (num) => (typeof num === 'number' ? num : 0).toFixed(2);

            const renderDynamicBarLabel = (props, activeIdx, type, dataArray) => {
                const { x, y, width, height, value, index } = props;
                if (index !== activeIdx) return (type === 'oee' ? <text x={x + width / 2} y={y - 10} fill="#94a3b8" textAnchor="middle" fontSize={10} fontWeight="700">{toFixed2(value)}%</text> : null);
                const isShort = height < 50; const boxY = isShort ? y - 48 : y + 8;
                return (
                    <g className="animate-fade-in-up" style={{ pointerEvents: 'none' }}>
                        <rect x={x + width / 2 - 40} y={boxY} width={80} height={34} rx={6} fill="rgba(15, 23, 42, 0.85)" stroke="rgba(255,255,255,0.2)" strokeWidth="1" />
                        <text x={x + width / 2} y={boxY + 13} fill={type === 'oee' ? "#34d399" : "#f472b6"} textAnchor="middle" fontSize={10} fontWeight="900">{type === 'oee' ? `OEE: ${toFixed2(value)}%` : `NG: ${formatNumber(value)}`}</text>
                        <text x={x + width / 2} y={boxY + 26} fill="#f8fafc" textAnchor="middle" fontSize={9} fontWeight="700">{type === 'oee' ? `Out: ${formatNumber(dataArray[index].output)}` : `Rate: ${toFixed2(dataArray[index].ngRate)}%`}</text>
                    </g>
                );
            };

            const renderCustomDot = (props, activeIdx, color) => {
                const { cx, cy, index } = props;
                return <circle cx={cx} cy={cy} r={index === activeIdx ? 8 : 4} fill={color} stroke="#fff" strokeWidth={index === activeIdx ? 3 : 2} opacity={index === activeIdx ? 1 : 0.3} style={{ transition: 'all 0.5s' }} />;
            };

            const renderActivePieShape = (props) => {
                const { cx, cy, innerRadius, outerRadius, startAngle, endAngle, fill, payload, value } = props;
                return (
                    <g>
                        <Sector cx={cx} cy={cy} innerRadius={innerRadius} outerRadius={outerRadius + 20} startAngle={startAngle} endAngle={endAngle} fill={fill} style={{ transition: 'all 0.5s cubic-bezier(0.4, 0, 0.2, 1)' }} />
                        <text x={cx} y={cy - 15} textAnchor="middle" fill="#ffffff" fontSize={20} fontWeight="900" style={{ filter: 'drop-shadow(0px 2px 4px rgba(0,0,0,0.8))' }}>{payload.name}</text>
                        <text x={cx} y={cy + 25} textAnchor="middle" fill="#ffffff" fontSize={38} fontWeight="900" style={{ filter: 'drop-shadow(0px 4px 8px rgba(0,0,0,0.8))' }}>{formatNumber(value)} <tspan fontSize="18" fill="#e2e8f0" fontWeight="bold" dx="8">Pcs.</tspan></text>
                    </g>
                );
            };

            return (
                <div className={isFullscreen ? "fixed inset-0 z-[9999] w-full h-[100dvh] overflow-y-auto bg-[#f1f5f9] p-4 md:p-8 pb-12" : "max-w-[90rem] mx-auto p-4 md:p-8 pb-12 relative"} style={isFullscreen ? { backgroundImage: 'radial-gradient(#cbd5e1 1px, transparent 1px)', backgroundSize: '32px 32px' } : {}}>
                    {/* --- HEADER --- */}
                    <div className="mb-10 flex flex-col md:flex-row md:items-center justify-between gap-6 glass-card p-6 md:p-8 rounded-[2rem]">
                        <div className="flex items-center gap-5 group cursor-pointer relative z-10">
                            <div className="p-4 bg-gradient-to-br from-blue-500 via-indigo-600 to-purple-600 rounded-[2rem] text-white shadow-xl shadow-blue-500/40 transform group-hover:scale-110 group-hover:-rotate-6 transition-all duration-500"><Icon name="Activity" size={40} /></div>
                            <div>
                                <h1 className="text-4xl md:text-5xl font-black uppercase tracking-tighter leading-none mb-3 bg-gradient-to-r from-slate-900 via-blue-800 to-slate-900 bg-clip-text text-transparent animate-gradient-x">OEE Production <br className="hidden md:block" /> <span className="text-3xl md:text-4xl bg-gradient-to-r from-slate-500 to-slate-400 bg-clip-text text-transparent">EN-Plating</span></h1>
                                <div className="flex items-center gap-3"><span className="text-[11px] font-black text-white uppercase tracking-widest bg-slate-800 px-3 py-1 rounded-full italic shadow-md">Working Days Tracking</span></div>
                            </div>
                        </div>
                        <div className="flex flex-wrap items-center justify-end gap-4 relative z-10 mt-4 md:mt-0">
                            <button onClick={toggleFullscreen} className="flex items-center gap-2 bg-white border-2 border-slate-200 hover:border-blue-400 text-slate-700 hover:text-blue-600 px-6 py-4 rounded-2xl font-black text-xs transition-all duration-300 shadow-sm"><Icon name={isFullscreen ? "Minimize" : "Maximize"} size={20} className="text-blue-500" /> {isFullscreen ? "ย่อหน้าจอ" : "เต็มจอ (FULLSCREEN)"}</button>
                            {!isFullscreen && (
                                <>
                                    <button onClick={handleSaveData} className="flex items-center gap-2 bg-white border-2 border-slate-200 hover:border-emerald-400 text-slate-700 hover:text-emerald-600 px-6 py-4 rounded-2xl font-black text-xs transition-all duration-300 shadow-sm"><Icon name="Save" size={20} className="text-emerald-500" /> SAVE DATA</button>
                                    <input type="file" ref={fileInputRef} onChange={handleFileUpload} accept=".xlsx, .xls" className="hidden" />
                                    <button onClick={() => fileInputRef.current.click()} className="flex items-center gap-2 bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-500 hover:to-indigo-500 text-white px-8 py-4 rounded-2xl font-black text-xs transition-all duration-300 shadow-lg"><Icon name="FileUp" size={20} /> IMPORT XLSX</button>
                                </>
                            )}
                        </div>
                    </div>

                    {message && <div className={`fixed top-6 left-1/2 -translate-x-1/2 z-50 px-8 py-4 rounded-2xl shadow-2xl flex items-center gap-3 animate-bounce ${message.type === 'success' ? 'bg-slate-900 text-emerald-400 border border-emerald-900/50' : 'bg-red-600 text-white'}`}><Icon name={message.type === 'success' ? "CheckCircle2" : "AlertCircle"} size={20} /><span className="font-black text-sm uppercase tracking-widest">{message.text}</span></div>}

                    {/* --- SUMMARY STATS --- */}
                    <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-7 gap-5 mb-10">
                        <div className="glass-card p-5 border-t-4 border-t-indigo-500">
                            <div className="text-[10px] font-black text-slate-500 uppercase tracking-wider mb-3 flex items-center gap-2"><Icon name="Clock" size={16} className="text-indigo-500" /> วันทำงาน/{selectedMonth}</div>
                            <div className="text-4xl font-black text-indigo-600 tracking-tighter"><AnimatedNumber value={currentData.monthlySummary.workingDays} formatter={formatNumber} /></div>
                            <div className="mt-4 flex items-center justify-between text-[10px] font-bold text-slate-400 bg-slate-100/50 px-2 py-1.5 rounded-xl border border-white/50"><span>Days</span><span className="text-indigo-600 bg-indigo-100 px-1.5 py-0.5 rounded-md">Col F</span></div>
                        </div>

                        <div className="glass-card p-5 border-t-4 border-t-blue-500">
                            <div className="text-[10px] font-black text-slate-500 uppercase tracking-wider mb-3 flex items-center gap-2"><Icon name="CalendarDays" size={16} className="text-blue-500" /> OEE เดือน{selectedMonth}</div>
                            <div className={`text-4xl font-black tracking-tighter ${currentData.monthlySummary.oee >= targets.oee ? 'text-emerald-500' : 'text-red-500'}`}><AnimatedNumber value={currentData.monthlySummary.oee} formatter={toFixed2} />%</div>
                            <div className="mt-4 flex items-center justify-between text-[10px] font-bold text-slate-400 bg-slate-100/50 px-2 py-1.5 rounded-xl border border-white/50"><span>Target: {targets.oee}%</span><span className="text-blue-600 bg-blue-100 px-1.5 py-0.5 rounded-md">{selectedMonth}</span></div>
                        </div>
                        <div className="glass-card p-5 border-t-4 border-t-emerald-500">
                            <div className="text-[10px] font-black text-slate-500 uppercase tracking-wider mb-3 flex items-center gap-2"><Icon name="Globe" size={16} className="text-emerald-500" /> OEE Overall</div>
                            <div className={`text-4xl font-black tracking-tighter ${overallOee >= targets.oee ? 'text-emerald-500' : 'text-red-500'}`}><AnimatedNumber value={overallOee} formatter={toFixed2} />%</div>
                            <div className="mt-4 flex items-center justify-between text-[10px] font-bold text-slate-400 bg-slate-100/50 px-2 py-1.5 rounded-xl border border-white/50"><span>Target: {targets.oee}%</span><span className="text-emerald-600 bg-emerald-100 px-1.5 py-0.5 rounded-md">C15</span></div>
                        </div>
                        <div className="glass-card p-5 border-t-4 border-t-amber-500">
                            <div className="text-[10px] font-black text-slate-500 uppercase tracking-wider mb-3 flex items-center gap-2"><Icon name="Boxes" size={16} className="text-amber-500" /> Total Output</div>
                            <div className="text-4xl font-black text-amber-500 tracking-tighter"><AnimatedNumber value={currentData.monthlySummary.output} formatter={formatNumber} /></div>
                            <div className="mt-4 flex items-center justify-between text-[10px] font-bold text-slate-400 bg-slate-100/50 px-2 py-1.5 rounded-xl border border-white/50"><span>Total PCS</span><span className="text-amber-600 bg-amber-100 px-1.5 py-0.5 rounded-md">Summary</span></div>
                        </div>
                        <div className="glass-card p-5 border-t-4 border-t-pink-500">
                            <div className="text-[10px] font-black text-slate-500 uppercase tracking-wider mb-3 flex items-center gap-2"><Icon name="TrendingDown" size={16} className="text-pink-500" /> Total % NG</div>
                            <div className={`text-4xl font-black tracking-tighter ${currentData.monthlySummary.ngRate <= targets.ng ? 'text-emerald-500' : 'text-red-500'}`}><AnimatedNumber value={currentData.monthlySummary.ngRate} formatter={toFixed2} />%</div>
                            <div className="mt-4 flex items-center justify-between text-[10px] font-bold text-slate-400 bg-slate-100/50 px-2 py-1.5 rounded-xl border border-white/50"><span>Limit: {targets.ng}%</span><span className="text-pink-600 bg-pink-100 px-1.5 py-0.5 rounded-md">Yield Rate</span></div>
                        </div>
                        <div className="glass-card p-5 border-t-4 border-t-red-600">
                            <div className="text-[10px] font-black text-slate-500 uppercase tracking-wider mb-3 flex items-center gap-2"><Icon name="AlertTriangle" size={16} className="text-red-600" /> Total NG Qty</div>
                            <div className="text-4xl font-black text-red-600 tracking-tighter"><AnimatedNumber value={currentData.monthlySummary.ngQty} formatter={formatNumber} /></div>
                            <div className="mt-4 flex items-center justify-between text-[10px] font-bold text-slate-400 bg-slate-100/50 px-2 py-1.5 rounded-xl border border-white/50"><span>Reject PCS</span><span className="text-red-600 bg-red-100 px-1.5 py-0.5 rounded-md">Summary</span></div>
                        </div>
                        <div className="glass-card p-5 border-t-4 border-t-orange-500">
                            <div className="text-[10px] font-black text-slate-500 uppercase tracking-wider mb-3 flex items-center gap-2"><Icon name="Activity" size={16} className="text-orange-500" /> % NG Overall</div>
                            <div className={`text-4xl font-black tracking-tighter ${overallNgRate <= targets.ng ? 'text-emerald-500' : 'text-red-600'}`}><AnimatedNumber value={overallNgRate} formatter={toFixed2} />%</div>
                            <div className="mt-4 flex items-center justify-between text-[10px] font-bold text-slate-400 bg-slate-100/50 px-2 py-1.5 rounded-xl border border-white/50"><span>Limit: {targets.ng}%</span><span className="text-orange-600 bg-orange-100 px-1.5 py-0.5 rounded-md">P51</span></div>
                        </div>
                    </div>

                    {/* --- CHART ZONE --- */}
                    <div className="bg-white/40 backdrop-blur-3xl p-6 md:p-8 rounded-[3rem] shadow-[0_8px_30px_rgb(0,0,0,0.04)] border border-white/50 mb-10 space-y-10">
                        <div className="grid grid-cols-1 lg:grid-cols-2 gap-8">
                            {/* 1. Oee Chart */}
                            <div className="glass-card p-8 rounded-[3rem] relative animate-fade-in-up">
                                <div className="absolute top-0 left-0 h-[4px] w-full bg-slate-800/10 rounded-t-[3rem] overflow-hidden z-20"><div key={autoPlayIndex} className="h-full bg-gradient-to-r from-blue-400 to-indigo-400 animate-scan-progress"></div></div>
                                <div className="flex items-center gap-4 mb-8 bg-blue-50/80 backdrop-blur-xl px-5 py-3 rounded-2xl w-fit border border-blue-100 shadow-sm relative z-10"><div className="p-2 bg-blue-600 text-white rounded-xl shadow-lg"><Icon name="BarChart2" size={20} /></div><h3 className="text-sm font-black text-blue-700 uppercase tracking-widest">OEE Result & Output Volume</h3></div>
                                <div className="h-[400px] w-full relative z-10">
                                    <ResponsiveContainer width="100%" height="100%">
                                        <ComposedChart data={yearlyOeeData} margin={{ top: 20, right: 30, left: 10, bottom: 10 }}>
                                            <defs>
                                                <linearGradient id="barGreen3D" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor="#10b981" /><stop offset="100%" stopColor="#047857" /></linearGradient>
                                                <linearGradient id="barRed3D" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor="#ef4444" /><stop offset="100%" stopColor="#991b1b" /></linearGradient>
                                                <linearGradient id="areaOutput" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor="#f59e0b" stopOpacity={0.25} /><stop offset="100%" stopColor="#f59e0b" stopOpacity={0} /></linearGradient>
                                            </defs>
                                            <CartesianGrid strokeDasharray="3 3" vertical={false} stroke="#cbd5e1" strokeOpacity={0.4} />
                                            <XAxis dataKey="shortName" axisLine={false} tickLine={false} tick={{ fontSize: 11, fontWeight: 900, fill: '#475569' }} dy={10} />
                                            <YAxis yAxisId="left" domain={[0, 110]} hide /><YAxis yAxisId="right" orientation="right" hide />
                                            <Tooltip cursor={{ fill: 'rgba(241, 245, 249, 0.4)' }} contentStyle={{ backgroundColor: 'rgba(255, 255, 255, 0.95)', backdropFilter: 'blur(10px)', borderRadius: '20px', border: '1px solid #e2e8f0' }} />
                                            <Legend verticalAlign="top" align="right" iconType="circle" wrapperStyle={{ fontSize: '11px', fontWeight: '900', paddingBottom: '20px' }} />
                                            <ReferenceLine yAxisId="left" y={targets.oee} stroke="#f43f5e" strokeDasharray="6 4" strokeWidth={2} label={{ position: 'top', value: `Target OEE ${targets.oee}%`, fill: '#f43f5e', fontSize: 10, fontWeight: 900 }} />
                                            <Area yAxisId="right" type="monotone" dataKey="output" fill="url(#areaOutput)" stroke="none" />
                                            <Bar yAxisId="left" dataKey="oee" name="OEE (%)" radius={[12, 12, 0, 0]} maxBarSize={45}>
                                                {yearlyOeeData.map((entry, index) => <Cell key={`cell-${index}`} fill={entry.oee >= targets.oee ? 'url(#barGreen3D)' : 'url(#barRed3D)'} opacity={index === yearlyOeeIndex ? 1 : 0.4} />)}
                                                <LabelList dataKey="oee" content={(props) => renderDynamicBarLabel(props, yearlyOeeIndex, 'oee', yearlyOeeData)} />
                                            </Bar>
                                            <Line yAxisId="right" type="monotone" dataKey="output" name="Output Volume" stroke="#f59e0b" strokeWidth={4} dot={(props) => renderCustomDot(props, yearlyOeeIndex, '#f59e0b')} activeDot={{ r: 8, fill: '#f59e0b', stroke: '#fff', strokeWidth: 3 }} className="chart-glow" />
                                        </ComposedChart>
                                    </ResponsiveContainer>
                                </div>
                            </div>

                            {/* 2. NG Chart */}
                            <div className="glass-card p-8 rounded-[3rem] relative animate-fade-in-up">
                                <div className="absolute top-0 left-0 h-[4px] w-full bg-slate-800/10 rounded-t-[3rem] overflow-hidden z-20"><div key={autoPlayIndex} className="h-full bg-gradient-to-r from-purple-400 to-pink-400 animate-scan-progress"></div></div>
                                <div className="flex items-center gap-4 mb-8 bg-purple-50/80 backdrop-blur-xl px-5 py-3 rounded-2xl w-fit border border-purple-100 shadow-sm relative z-10"><div className="p-2 bg-purple-600 text-white rounded-xl shadow-lg"><Icon name="ActivitySquare" size={20} /></div><h3 className="text-sm font-black text-purple-700 uppercase tracking-widest">NG Plating Analysis</h3></div>
                                <div className="h-[400px] w-full relative z-10">
                                    <ResponsiveContainer width="100%" height="100%">
                                        <ComposedChart data={annualChartData} margin={{ top: 20, right: 30, left: 10, bottom: 10 }}>
                                            <defs>
                                                <linearGradient id="barNg3D" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor="#d946ef" /><stop offset="100%" stopColor="#701a75" /></linearGradient>
                                                <linearGradient id="barNgTotal3D" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor="#6366f1" /><stop offset="100%" stopColor="#312e81" /></linearGradient>
                                                <linearGradient id="areaNgRate" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor="#ec4899" stopOpacity={0.2} /><stop offset="100%" stopColor="#ec4899" stopOpacity={0} /></linearGradient>
                                            </defs>
                                            <CartesianGrid strokeDasharray="3 3" vertical={false} stroke="#cbd5e1" strokeOpacity={0.4} />
                                            <XAxis dataKey="shortName" axisLine={false} tickLine={false} tick={{ fontSize: 11, fontWeight: 900, fill: '#475569' }} dy={10} />
                                            <YAxis yAxisId="left" hide />
                                            <YAxis yAxisId="right" orientation="right" domain={[0, (dataMax) => Math.max(dataMax, targets.ng) * 1.5]} hide />
                                            <Tooltip cursor={{ fill: 'rgba(241, 245, 249, 0.4)' }} contentStyle={{ backgroundColor: 'rgba(255, 255, 255, 0.95)', backdropFilter: 'blur(10px)', borderRadius: '20px', border: '1px solid #e2e8f0' }} />
                                            <Legend verticalAlign="top" align="right" iconType="circle" wrapperStyle={{ fontSize: '11px', fontWeight: '900', paddingBottom: '20px' }} />
                                            <ReferenceLine yAxisId="right" y={targets.ng} stroke="#ef4444" strokeDasharray="10 5" strokeWidth={2.5} label={{ position: 'top', value: `Limit ${targets.ng}%`, fill: '#ef4444', fontSize: 11, fontWeight: 900 }} />
                                            <Area yAxisId="right" type="monotone" dataKey="ngRate" fill="url(#areaNgRate)" stroke="none" />
                                            <Bar yAxisId="left" dataKey="ngQty" name="NG Quantity" radius={[12, 12, 0, 0]} maxBarSize={45}>
                                                {annualChartData.map((entry, index) => <Cell key={`cell-${index}`} fill={entry.isTotal ? 'url(#barNgTotal3D)' : 'url(#barNg3D)'} opacity={index === yearlyNgIndex ? 1 : 0.4} />)}
                                                <LabelList dataKey="ngQty" content={(props) => renderDynamicBarLabel(props, yearlyNgIndex, 'ngQty', annualChartData)} />
                                            </Bar>
                                            <Line yAxisId="right" type="monotone" dataKey="ngRate" name="NG Rate (%)" stroke="#ec4899" strokeWidth={4} dot={(props) => renderCustomDot(props, yearlyNgIndex, '#ec4899')} activeDot={{ r: 8, fill: '#ec4899', stroke: '#fff', strokeWidth: 3 }} className="chart-glow" />
                                        </ComposedChart>
                                    </ResponsiveContainer>
                                </div>
                            </div>
                        </div>

                        {/* Pie Chart */}
                        <div className="flex justify-center mt-12">
                            <div className="w-full max-w-[1000px] bg-slate-900 border border-slate-700 shadow-[0_30px_60px_rgba(0,0,0,0.5)] p-10 md:p-14 rounded-[4rem] relative overflow-hidden flex flex-col animate-fade-in-up">
                                <div className="absolute top-0 left-0 h-[4px] w-full bg-slate-800/50 rounded-t-[4rem] overflow-hidden z-20"><div key={pieAutoPlayIndex} className="h-full bg-gradient-to-r from-rose-400 to-orange-400 animate-scan-progress-pie"></div></div>
                                <div className="flex items-center gap-4 mb-4 relative z-20 bg-slate-800/60 backdrop-blur w-fit p-3 pr-6 rounded-2xl border border-slate-700">
                                    <div className="p-3 bg-gradient-to-br from-rose-500 to-orange-600 text-white rounded-xl"><Icon name="PieChart" size={24} /></div>
                                    <div><h3 className="text-lg font-black text-white uppercase tracking-widest leading-tight">NG Type Distribution</h3><p className="text-[10px] text-slate-400 font-bold uppercase tracking-widest mt-0.5 italic">Monthly Breakdown: {selectedMonth}</p></div>
                                </div>
                                <div className="flex-1 w-full min-h-[500px] relative z-10">
                                    {pieData.length > 0 ? (
                                        <ResponsiveContainer width="100%" height="100%">
                                            <PieChart>
                                                <Pie activeIndex={pieIndex} activeShape={renderActivePieShape} data={pieData} cx="50%" cy="50%" innerRadius={110} outerRadius={170} paddingAngle={4} dataKey="value" animationDuration={1500}>
                                                    {pieData.map((entry, index) => <Cell key={`cell-${index}`} fill={['#ef4444', '#3b82f6', '#10b981', '#f59e0b', '#8b5cf6', '#06b6d4', '#f97316', '#ec4899', '#84cc16'][index % 9]} opacity={index === pieIndex ? 1 : 0.4} stroke={index === pieIndex ? '#fff' : 'none'} strokeWidth={3} />)}
                                                </Pie>
                                                <Tooltip formatter={(value, name) => [formatNumber(value) + ' Pcs.', name]} contentStyle={{ backgroundColor: 'rgba(15, 23, 42, 0.9)', border: '1px solid #334155', borderRadius: '16px', color: '#fff' }} />
                                                <Legend layout="horizontal" verticalAlign="bottom" align="center" wrapperStyle={{ fontSize: '11px', fontWeight: 'bold', color: '#94a3b8', paddingTop: '30px' }} />
                                            </PieChart>                                        </ResponsiveContainer>
                                    ) : <div className="flex flex-col items-center justify-center h-full text-slate-500 text-sm font-bold uppercase tracking-widest italic opacity-50"><Icon name="Inbox" size={40} />No Rejection Data for {selectedMonth}</div>}
                                </div>
                            </div>
                        </div>
                    </div>

                    {/* --- DATA ENTRY (INPUT PANEL) --- */}
                    {!isFullscreen && (
                        <div className="mb-10 bg-white/60 backdrop-blur-xl p-6 md:p-8 rounded-[2.5rem] shadow-sm border border-white overflow-hidden transition-all duration-300">
                            <div className={`flex items-center justify-between cursor-pointer group ${showInputPanel ? 'mb-8 border-b border-slate-200/60 pb-5' : ''}`} onClick={() => setShowInputPanel(!showInputPanel)}>
                                <div className="flex items-center gap-3"><div className="p-2 bg-amber-100 rounded-xl text-amber-500"><Icon name="SlidersHorizontal" size={24} /></div><h2 className="text-lg font-black text-slate-800 uppercase italic">แผงจัดการข้อมูล (Working Days & OEE Input)</h2></div>
                                <button className="flex items-center gap-2 text-xs font-black text-slate-500 bg-white shadow-sm px-4 py-2 rounded-full border border-slate-200 transition-all">{showInputPanel ? <><Icon name="EyeOff" size={16} /> ซ่อนแผงข้อมูล</> : <><Icon name="Eye" size={16} /> แสดงแผงข้อมูล</>}</button>
                            </div>
                            {showInputPanel && (
                                <div className="w-full">
                                    <div className="overflow-x-auto custom-scrollbar">
                                        <table className="w-full text-left">
                                            <thead>
                                                <tr className="text-[10px] font-black text-slate-400 uppercase tracking-widest italic border-b-2 border-slate-200/60">
                                                    <th className="pb-3 pl-2">เดือน</th>
                                                    <th className="pb-3 text-center">วันทำงาน (F)</th>
                                                    <th className="pb-3 text-center">OEE (%)</th>
                                                    <th className="pb-3 text-center">Output (Pcs)</th>
                                                    <th className="pb-3 text-center">NG (Qty)</th>
                                                    <th className="pb-3 text-center">NG (%)</th>
                                                    <th className="pb-3 text-right pr-2">เลือก</th>
                                                </tr>
                                            </thead>
                                            <tbody>
                                                {months.map((m, idx) => (
                                                    <tr key={idx} className={`border-b border-slate-100 transition-all duration-300 ${selectedMonth === m ? 'bg-blue-50/80 shadow-inner' : 'hover:bg-slate-50'}`}>
                                                        <td className="py-2 pl-2"><span className={`text-xs font-black ${selectedMonth === m ? 'text-blue-600' : 'text-slate-600'}`}>{m}</span></td>
                                                        <td className="py-1 text-center"><input type="number" value={fullYearData[m].monthlySummary.workingDays} onChange={(e) => updateSpecificMonthData(m, 'workingDays', e.target.value)} className="w-20 bg-white border border-slate-200 rounded-lg px-2 py-1 text-[11px] font-black text-indigo-600 text-center outline-none" /></td>
                                                        <td className="py-1 text-center"><input type="number" step="0.01" value={fullYearData[m].monthlySummary.oee} onChange={(e) => updateSpecificMonthData(m, 'oee', e.target.value)} className="w-24 bg-white border border-slate-200 rounded-lg px-2 py-1 text-[11px] font-black text-blue-600 text-center outline-none" /></td>
                                                        <td className="py-1 text-center"><input type="number" value={fullYearData[m].monthlySummary.output} onChange={(e) => updateSpecificMonthData(m, 'output', e.target.value)} className="w-32 bg-white border border-slate-200 rounded-lg px-2 py-1 text-[11px] font-black text-slate-600 text-center outline-none" /></td>
                                                        <td className="py-1 text-center"><input type="number" value={fullYearData[m].monthlySummary.ngQty} onChange={(e) => updateSpecificMonthData(m, 'ngQty', e.target.value)} className="w-24 bg-white border border-slate-200 rounded-lg px-2 py-1 text-[11px] font-black text-rose-500 text-center outline-none" /></td>
                                                        <td className="py-1 text-center"><input type="number" step="0.01" value={fullYearData[m].monthlySummary.ngRate} onChange={(e) => updateSpecificMonthData(m, 'ngRate', e.target.value)} className="w-24 bg-white border border-slate-200 rounded-lg px-2 py-1 text-[11px] font-black text-rose-600 text-center outline-none" /></td>
                                                        <td className="py-1 text-right pr-2"><button onClick={() => setSelectedMonth(m)} className={`p-1.5 rounded-xl transition-all ${selectedMonth === m ? 'bg-blue-600 text-white shadow-md' : 'bg-white border border-slate-200 text-slate-400 hover:text-blue-600'}`}><Icon name="MousePointer2" size={14} /></button></td>
                                                    </tr>
                                                ))}
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                            )}
                        </div>
                    )}
                    <div className="mt-8 text-center"><div className="inline-flex items-center gap-3 px-8 py-3 bg-white/60 backdrop-blur-md rounded-full text-slate-500 text-[10px] font-black uppercase tracking-[0.3em] border border-white shadow-sm italic"><Icon name="Zap" size={14} className="text-amber-500 animate-pulse" /> EN Plating Solero Division • Working Days Monitoring Active</div></div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
