<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OEE Production EN-Plating</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- SheetJS สำหรับอ่านไฟล์ Excel -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700;800&display=swap');
        body { 
            font-family: 'Sarabun', sans-serif; 
            background-color: #f1f5f9;
            background-image: radial-gradient(#cbd5e1 1px, transparent 1px);
            background-size: 32px 32px;
        }
        input[type=number]::-webkit-inner-spin-button, 
        input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        
        @keyframes gradient-x {
            0%, 100% { background-size: 200% 200%; background-position: left center; }
            50% { background-size: 200% 200%; background-position: right center; }
        }
        .animate-gradient-x { animation: gradient-x 3s ease infinite; }

        @keyframes fade-in-up {
            0% { opacity: 0; transform: translateY(30px) scale(0.95); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }
        .animate-fade-in-up { animation: fade-in-up 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards; opacity: 0; }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-6px); }
        }
        .animate-float { animation: float 4s ease-in-out infinite; }

        @keyframes shimmer-sweep {
            0% { transform: translateX(-150%) skewX(-20deg); }
            100% { transform: translateX(250%) skewX(-20deg); }
        }
        .shimmer-glass {
            position: relative;
            overflow: hidden;
        }
        .shimmer-glass::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 40%; height: 100%;
            background: linear-gradient(to right, rgba(255,255,255,0) 0%, rgba(255,255,255,0.4) 50%, rgba(255,255,255,0) 100%);
            transform: skewX(-20deg);
            animation: shimmer-sweep 4s infinite ease-in-out;
            pointer-events: none;
            z-index: 10;
        }

        /* Progress Bar สำหรับ Auto Scan 10 วินาที */
        @keyframes scan-progress {
            0% { width: 0%; }
            100% { width: 100%; }
        }
        .animate-scan-progress {
            animation: scan-progress 10s linear infinite;
        }
        .animate-scan-progress-pie {
            animation: scan-progress 6s linear infinite;
        }

        /* Radar Spin สำหรับกราฟวงกลม */
        @keyframes radar-spin {
            from { transform: translate(-50%, -50%) rotate(0deg); }
            to { transform: translate(-50%, -50%) rotate(360deg); }
        }
        .radar-bg {
            background: conic-gradient(from 0deg, transparent 70%, rgba(244, 63, 94, 0.4) 100%);
            animation: radar-spin 4s linear infinite;
        }
        @keyframes pulse-ring {
            0% { transform: translate(-50%, -50%) scale(0.8); opacity: 0.8; }
            100% { transform: translate(-50%, -50%) scale(1.5); opacity: 0; }
        }
        .animate-pulse-ring {
            animation: pulse-ring 3s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }

        .glass-card { 
            @apply bg-white/80 backdrop-blur-xl border border-white/60 shadow-[0_8px_30px_rgb(0,0,0,0.04)] transition-all duration-500 hover:shadow-[0_15px_40px_rgb(0,0,0,0.12)] hover:-translate-y-2 relative overflow-hidden; 
        }
        
        .chart-glow {
            filter: drop-shadow(0px 10px 15px rgba(0, 0, 0, 0.1));
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <!-- Load Libraries -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/prop-types@15.8.1/prop-types.min.js"></script>
    <script src="https://unpkg.com/recharts@2.12.7/umd/Recharts.js"></script>
    <script src="https://unpkg.com/lucide@0.453.0/dist/umd/lucide.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;
        const { 
            BarChart, Bar, Cell, XAxis, YAxis, CartesianGrid, Tooltip, 
            ResponsiveContainer, ReferenceLine, LabelList, Legend, Line, ComposedChart,
            PieChart, Pie, Sector, Area
        } = window.Recharts;
        
        const Icon = ({ name, size = 24, className = "", style = {} }) => {
            const iconData = window.lucide.icons[name];
            if (!iconData) return null;
            const [tag, attrs, children] = iconData;
            return (
                <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className} style={style}
                    dangerouslySetInnerHTML={{
                        __html: children.map(([childTag, childAttrs]) => {
                            const attrString = Object.entries(childAttrs).map(([key, value]) => `${key}="${value}"`).join(' ');
                            return `<${childTag} ${attrString}></${childTag}>`;
                        }).join('')
                    }}
                />
            );
        };

        const AnimatedNumber = ({ value, formatter, duration = 1500 }) => {
            const [displayValue, setDisplayValue] = useState(0);

            useEffect(() => {
                let startTime = null;
                let animationFrameId;
                const animate = (timestamp) => {
                    if (!startTime) startTime = timestamp;
                    const progress = Math.min((timestamp - startTime) / duration, 1);
                    const easeProgress = 1 - Math.pow(1 - progress, 4);
                    setDisplayValue(value * easeProgress);
                    if (progress < 1) {
                        animationFrameId = requestAnimationFrame(animate);
                    } else {
                        setDisplayValue(value);
                    }
                };
                animationFrameId = requestAnimationFrame(animate);
                return () => cancelAnimationFrame(animationFrameId);
            }, [value, duration]);

            return <span>{formatter(displayValue)}</span>;
        };

        const App = () => {
            const months = ["มกราคม", "กุมภาพันธ์", "มีนาคม", "เมษายน", "พฤษภาคม", "มิถุนายน", "กรกฎาคม", "สิงหาคม", "กันยายน", "ตุลาคม", "พฤศจิกายน", "ธันวาคม"];
            const monthAbbr = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];
            const fileInputRef = useRef(null);

            const createEmptyYearData = () => {
                const yearData = {};
                months.forEach(m => {
                    yearData[m] = {
                        monthlySummary: { oee: 0, output: 0, ngRate: 0, ngQty: 0, ngBreakdown: [] },
                        dailyData: [
                            { date: '', oee: 0, output: 0 },
                            { date: '', oee: 0, output: 0 },
                            { date: '', oee: 0, output: 0 },
                        ]
                    };
                });
                return yearData;
            };

            const getLatestMonthWithData = (dataToScan) => {
                for (let i = months.length - 1; i >= 0; i--) {
                    const m = months[i];
                    const summary = dataToScan[m].monthlySummary;
                    if (summary.output > 0 || summary.oee > 0 || summary.ngQty > 0) {
                        return m;
                    }
                }
                const currentMonthIndex = new Date().getMonth();
                return months[currentMonthIndex]; 
            };

            const [selectedMonth, setSelectedMonth] = useState(() => {
                return months[new Date().getMonth()];
            });
            const [fullYearData, setFullYearData] = useState(createEmptyYearData());
            const [targets, setTargets] = useState({ oee: 90.0, ng: 1.0 });
            const [message, setMessage] = useState(null);
            const [overallNgRate, setOverallNgRate] = useState(0);
            const [overallOee, setOverallOee] = useState(0);
            const [showInputPanel, setShowInputPanel] = useState(true);
            const [isFullscreen, setIsFullscreen] = useState(false);
            
            const [autoPlayIndex, setAutoPlayIndex] = useState(0);
            const [pieAutoPlayIndex, setPieAutoPlayIndex] = useState(0);

            useEffect(() => {
                try {
                    const savedData = localStorage.getItem('oeeDashboardData');
                    if (savedData) {
                        const parsed = JSON.parse(savedData);
                        if (parsed.fullYearData) {
                            setFullYearData(parsed.fullYearData);
                            setSelectedMonth(getLatestMonthWithData(parsed.fullYearData));
                        }
                        if (parsed.targets) setTargets(parsed.targets);
                        if (parsed.overallNgRate !== undefined) setOverallNgRate(parsed.overallNgRate);
                        if (parsed.overallOee !== undefined) setOverallOee(parsed.overallOee);
                    }
                } catch (e) {
                    console.error("Failed to load data", e);
                }
            }, []);

            useEffect(() => {
                const timer = setInterval(() => {
                    setAutoPlayIndex(prev => prev + 1);
                }, 10000); 
                return () => clearInterval(timer);
            }, []);

            useEffect(() => {
                const timer = setInterval(() => {
                    setPieAutoPlayIndex(prev => prev + 1);
                }, 6000); 
                return () => clearInterval(timer);
            }, []);

            useEffect(() => {
                const handleFullscreenChange = () => {
                    if (!document.fullscreenElement && isFullscreen) {
                        setIsFullscreen(false);
                    }
                };
                document.addEventListener('fullscreenchange', handleFullscreenChange);
                return () => document.removeEventListener('fullscreenchange', handleFullscreenChange);
            }, [isFullscreen]);

            useEffect(() => {
                const handleKeyDown = (e) => {
                    if (e.key === 'Escape' && isFullscreen) {
                        if (document.fullscreenElement && document.exitFullscreen) {
                            document.exitFullscreen();
                        }
                        setIsFullscreen(false);
                    }
                };
                window.addEventListener('keydown', handleKeyDown);
                return () => window.removeEventListener('keydown', handleKeyDown);
            }, [isFullscreen]);

            const toggleFullscreen = () => {
                if (!isFullscreen) {
                    // ลองใช้ Native Fullscreen (แบบ PowerPoint แท้ๆ)
                    if (document.documentElement.requestFullscreen) {
                        document.documentElement.requestFullscreen()
                            .then(() => setIsFullscreen(true))
                            .catch((err) => {
                                console.warn("Native fullscreen blocked, using CSS fallback.");
                                setIsFullscreen(true); 
                            });
                    } else {
                        setIsFullscreen(true);
                    }
                } else {
                    if (document.fullscreenElement && document.exitFullscreen) {
                        document.exitFullscreen()
                            .then(() => setIsFullscreen(false))
                            .catch(() => setIsFullscreen(false));
                    } else {
                        setIsFullscreen(false);
                    }
                }
            };

            const currentData = useMemo(() => fullYearData[selectedMonth], [fullYearData, selectedMonth]);

            const annualChartData = useMemo(() => {
                const data = months.map((m, idx) => ({
                    name: m,
                    shortName: monthAbbr[idx],
                    oee: fullYearData[m].monthlySummary.oee,
                    output: fullYearData[m].monthlySummary.output,
                    ngRate: fullYearData[m].monthlySummary.ngRate,
                    ngQty: fullYearData[m].monthlySummary.ngQty,
                    isTotal: false
                }));

                let totalOutput = 0;
                let totalNgQty = 0;
                data.forEach(d => {
                    totalOutput += d.output;
                    totalNgQty += d.ngQty;
                });

                const totalNgRate = totalOutput > 0 ? (totalNgQty / totalOutput) * 100 : 0;

                data.push({
                    name: "รวมทั้งปี",
                    shortName: "Total",
                    oee: 0, 
                    output: totalOutput,
                    ngRate: totalNgRate,
                    ngQty: totalNgQty,
                    isTotal: true
                });

                return data;
            }, [fullYearData]);

            const yearlyOeeData = annualChartData.filter(d => !d.isTotal);
            const scannableYearlyIndices = yearlyOeeData.map((d, i) => (d.output > 0 || d.oee > 0) ? i : -1).filter(i => i !== -1);
            if (scannableYearlyIndices.length === 0) scannableYearlyIndices.push(0);
            const yearlyOeeIndex = scannableYearlyIndices[autoPlayIndex % scannableYearlyIndices.length];

            const scannableNgIndices = annualChartData.map((d, i) => (d.output > 0 || d.ngQty > 0 || d.isTotal) ? i : -1).filter(i => i !== -1);
            if (scannableNgIndices.length === 0) scannableNgIndices.push(0);
            const yearlyNgIndex = scannableNgIndices[autoPlayIndex % scannableNgIndices.length];

            const reversedDaily = [...currentData.dailyData].reverse();
            const scannableDailyIndices = reversedDaily.map((d, i) => (d.output > 0 || d.oee > 0) ? i : -1).filter(i => i !== -1);
            if (scannableDailyIndices.length === 0) scannableDailyIndices.push(0);
            const dailyIndex = scannableDailyIndices[autoPlayIndex % scannableDailyIndices.length];

            const pieData = currentData.monthlySummary.ngBreakdown ? currentData.monthlySummary.ngBreakdown.filter(d => d.value > 0) : [];
            const pieIndex = pieData.length > 0 ? pieAutoPlayIndex % pieData.length : 0;

            const handleFileUpload = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (evt) => {
                    try {
                        const bstr = evt.target.result;
                        const wb = XLSX.read(bstr, { type: 'binary' });
                        const newYearData = { ...fullYearData };
                        const summaryWs = wb.Sheets["Summary monthly"];
                        
                        const ngTypesConfig = [
                            { name: 'Product lost', col: 'G' },
                            { name: 'QC Semple', col: 'H' },
                            { name: 'Test Thickness', col: 'I' },
                            { name: 'Dent (Handling)', col: 'J' },
                            { name: 'Stain', col: 'K' },
                            { name: 'Plating abnormal', col: 'L' },
                            { name: 'Blister', col: 'M' },
                            { name: 'Barrel not rotate', col: 'N' },
                            { name: 'Thickness out spec', col: 'O' }
                        ];

                        if (summaryWs) {
                            const findRowByMonthName = (ws, col, monthAbbr, startRow, endRow) => {
                                const target = monthAbbr.toLowerCase();
                                for (let r = startRow; r <= endRow; r++) {
                                    const cell = ws[`${col}${r}`];
                                    if (cell) {
                                        const cellText = cell.w ? String(cell.w).trim().toLowerCase() : String(cell.v).trim().toLowerCase();
                                        if (cellText.startsWith(target)) return r;
                                    }
                                }
                                return -1;
                            };

                            months.forEach((m, idx) => {
                                const mAbbr = monthAbbr[idx]; 
                                
                                let oeeRow = findRowByMonthName(summaryWs, 'A', mAbbr, 2, 20);
                                if (oeeRow === -1) oeeRow = findRowByMonthName(summaryWs, 'B', mAbbr, 2, 20);
                                if (oeeRow === -1) oeeRow = 3 + idx; 

                                let ngRow = findRowByMonthName(summaryWs, 'A', mAbbr, 30, 60);
                                if (ngRow === -1) ngRow = 34 + idx; 

                                const oeeCell = summaryWs[`C${oeeRow}`];
                                const outputCell = summaryWs[`B${ngRow}`];
                                const ngQtyCell = summaryWs[`E${ngRow}`];
                                const ngRateCell = summaryWs[`F${ngRow}`];

                                const oeeVal = oeeCell?.v || 0;
                                const outputVal = outputCell?.v || 0;
                                const qtyVal = ngQtyCell?.v || 0;
                                const rateVal = ngRateCell?.v || 0;

                                const rawOee = typeof oeeVal === 'number' ? (oeeVal <= 1 ? oeeVal * 100 : oeeVal) : 0;
                                newYearData[m].monthlySummary.oee = Math.round(rawOee * 100) / 100;
                                newYearData[m].monthlySummary.output = typeof outputVal === 'number' ? outputVal : 0;
                                newYearData[m].monthlySummary.ngQty = typeof qtyVal === 'number' ? qtyVal : 0;
                                const rawNg = typeof rateVal === 'number' ? (rateVal <= 1 ? rateVal * 100 : rateVal) : 0;
                                newYearData[m].monthlySummary.ngRate = Math.round(rawNg * 100) / 100;

                                const monthNgBreakdown = ngTypesConfig.map(type => {
                                    const cellRef = summaryWs[`${type.col}${ngRow}`];
                                    const cellVal = cellRef?.v || 0;
                                    return { name: type.name, value: (typeof cellVal === 'number' ? cellVal : 0) };
                                });
                                newYearData[m].monthlySummary.ngBreakdown = monthNgBreakdown;
                            });

                            const p51Cell = summaryWs['P51'];
                            const p51Val = p51Cell?.v || 0;
                            const rawP51Ng = typeof p51Val === 'number' ? (p51Val <= 1 ? p51Val * 100 : p51Val) : 0;
                            setOverallNgRate(Math.round(rawP51Ng * 100) / 100);

                            const c15Cell = summaryWs['C15'];
                            const c15Val = c15Cell?.v || 0;
                            const rawC15Oee = typeof c15Val === 'number' ? (c15Val <= 1 ? c15Val * 100 : c15Val) : 0;
                            setOverallOee(Math.round(rawC15Oee * 100) / 100);
                        }
                        setFullYearData(newYearData);
                        setSelectedMonth(getLatestMonthWithData(newYearData));
                        setMessage({ type: 'success', text: `นำเข้าข้อมูลจาก Excel สำเร็จ พร้อมอัปเดตกราฟ!` });
                        setTimeout(() => setMessage(null), 3000);
                    } catch (err) {
                        setMessage({ type: 'error', text: 'รูปแบบไฟล์ไม่ถูกต้อง' });
                        setTimeout(() => setMessage(null), 3000);
                    }
                };
                reader.readAsBinaryString(file);
            };

            const handleSaveData = () => {
                const dataToSave = { fullYearData, targets, overallNgRate, overallOee };
                try {
                    localStorage.setItem('oeeDashboardData', JSON.stringify(dataToSave));
                    setMessage({ type: 'success', text: 'บันทึกข้อมูลลงระบบเรียบร้อยแล้ว' });
                } catch (error) {
                    try {
                        const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(dataToSave));
                        const downloadAnchorNode = document.createElement('a');
                        downloadAnchorNode.setAttribute("href", dataStr);
                        downloadAnchorNode.setAttribute("download", `OEE_Backup.json`);
                        document.body.appendChild(downloadAnchorNode);
                        downloadAnchorNode.click();
                        downloadAnchorNode.remove();
                        setMessage({ type: 'success', text: 'ดาวน์โหลดไฟล์สำรองสำเร็จ (เนื่องจากเบราว์เซอร์บล็อกการเซฟปกติ)' });
                    } catch (fallbackError) {
                        setMessage({ type: 'error', text: 'ไม่สามารถบันทึกข้อมูลได้' });
                    }
                }
                setTimeout(() => setMessage(null), 3000);
            };

            const updateSpecificMonthData = (month, field, value) => {
                const numVal = (field === 'output' || field === 'ngQty') ? (parseInt(value) || 0) : (parseFloat(value) || 0);
                setFullYearData(prev => ({
                    ...prev,
                    [month]: { ...prev[month], monthlySummary: { ...prev[month].monthlySummary, [field]: numVal } }
                }));
            };

            const updateDailyData = (index, field, value) => {
                const newDaily = [...currentData.dailyData];
                newDaily[index][field] = field === 'oee' ? parseFloat(value) || 0 : parseInt(value) || 0;
                setFullYearData(prev => ({
                    ...prev,
                    [selectedMonth]: { ...prev[selectedMonth], dailyData: newDaily }
                }));
            };

            const formatNumber = (num) => new Intl.NumberFormat().format(Math.round(num));
            const toFixed2 = (num) => (typeof num === 'number' ? num : 0).toFixed(2);

            const renderDynamicBarLabel = (props, activeIdx, type, dataArray) => {
                const { x, y, width, height, value, index } = props;
                const isActive = index === activeIdx;
                const data = dataArray[index];

                if (!isActive) {
                    if (type === 'oee' || type === 'dailyOee') {
                        return <text x={x + width / 2} y={y - 10} fill="#94a3b8" textAnchor="middle" fontSize={10} fontWeight="700">{toFixed2(value)}%</text>;
                    }
                    if (type === 'ngQty') {
                        if(data.isTotal) {
                            return (
                                <g>
                                    <text x={x + width / 2} y={y - 25} fill="#64748b" textAnchor="middle" fontSize={11} fontWeight="900">{formatNumber(value)}</text>
                                    <text x={x + width / 2} y={y - 10} fill="#ec4899" textAnchor="middle" fontSize={10} fontWeight="900">({toFixed2(data.ngRate)}%)</text>
                                </g>
                            );
                        }
                        return <text x={x + width / 2} y={y - 10} fill="#94a3b8" textAnchor="middle" fontSize={10} fontWeight="700">{formatNumber(value)}</text>;
                    }
                    return null;
                }

                const isShort = height < 50;
                const boxY = isShort ? y - 48 : y + 8;
                
                if (type === 'oee' || type === 'dailyOee') {
                    return (
                        <g className="animate-fade-in-up" style={{ pointerEvents: 'none' }}>
                            <rect x={x + width / 2 - 40} y={boxY} width={80} height={34} rx={6} fill="rgba(15, 23, 42, 0.85)" stroke="rgba(255,255,255,0.2)" strokeWidth="1" />
                            <text x={x + width / 2} y={boxY + 13} fill="#34d399" textAnchor="middle" fontSize={10} fontWeight="900">OEE: {toFixed2(value)}%</text>
                            <text x={x + width / 2} y={boxY + 26} fill="#f8fafc" textAnchor="middle" fontSize={9} fontWeight="700">Out: {formatNumber(data.output)}</text>
                        </g>
                    );
                }
                if (type === 'ngQty') {
                    return (
                        <g className="animate-fade-in-up" style={{ pointerEvents: 'none' }}>
                            <rect x={x + width / 2 - 40} y={boxY} width={80} height={34} rx={6} fill="rgba(15, 23, 42, 0.85)" stroke="rgba(255,255,255,0.2)" strokeWidth="1" />
                            <text x={x + width / 2} y={boxY + 13} fill="#f472b6" textAnchor="middle" fontSize={10} fontWeight="900">NG: {formatNumber(value)}</text>
                            <text x={x + width / 2} y={boxY + 26} fill="#f8fafc" textAnchor="middle" fontSize={9} fontWeight="700">Rate: {toFixed2(data.ngRate)}%</text>
                        </g>
                    );
                }
            };

            const renderCustomDot = (props, activeIdx, color) => {
                const { cx, cy, index } = props;
                const isActive = index === activeIdx;
                return (
                    <circle 
                        key={`dot-${index}`}
                        cx={cx} cy={cy} 
                        r={isActive ? 8 : 4} 
                        fill={color} 
                        stroke="#fff" 
                        strokeWidth={isActive ? 3 : 2} 
                        opacity={isActive ? 1 : 0.3}
                        style={isActive ? { filter: `drop-shadow(0px 0px 8px ${color})`, transition: 'all 0.5s' } : { transition: 'all 0.5s' }}
                    />
                );
            };

            const renderActivePieShape = (props) => {
                const { cx, cy, innerRadius, outerRadius, startAngle, endAngle, fill, payload, value } = props;
                return (
                    <g>
                        <defs>
                            <filter id={`glow-${payload.name.replace(/\s+/g, '-')}`}>
                                <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
                                <feMerge>
                                    <feMergeNode in="coloredBlur"/>
                                    <feMergeNode in="SourceGraphic"/>
                                </feMerge>
                            </filter>
                        </defs>
                        <Sector
                            cx={cx} cy={cy}
                            innerRadius={innerRadius}
                            outerRadius={outerRadius + 20}
                            startAngle={startAngle}
                            endAngle={endAngle}
                            fill={fill}
                            filter={`url(#glow-${payload.name.replace(/\s+/g, '-')})`}
                            style={{ transition: 'all 0.5s cubic-bezier(0.4, 0, 0.2, 1)' }}
                        />
                        <Sector
                            cx={cx} cy={cy}
                            startAngle={startAngle}
                            endAngle={endAngle}
                            innerRadius={outerRadius + 28}
                            outerRadius={outerRadius + 32}
                            fill={fill}
                            className="animate-pulse"
                            style={{ transition: 'all 0.5s' }}
                        />
                        <text x={cx} y={cy - 15} textAnchor="middle" fill="#f8fafc" fontSize={18} fontWeight="900" className="animate-fade-in-up uppercase tracking-widest drop-shadow-lg">
                            {payload.name}
                        </text>
                        <text x={cx} y={cy + 25} textAnchor="middle" fill={fill} fontSize={36} fontWeight="900" className="animate-fade-in-up drop-shadow-[0_0_15px_currentColor]">
                            {formatNumber(value)} <tspan fontSize="16" fill="#94a3b8" fontWeight="bold" dx="5">Pcs.</tspan>
                        </text>
                    </g>
                );
            };

            return (
                <div 
                    className={isFullscreen 
                        ? "fixed inset-0 z-[9999] w-full h-[100dvh] overflow-y-auto bg-[#f1f5f9] p-4 md:p-8 pb-12" 
                        : "max-w-[90rem] mx-auto p-4 md:p-8 pb-12 relative"}
                    style={isFullscreen 
                        ? { backgroundImage: 'radial-gradient(#cbd5e1 1px, transparent 1px)', backgroundSize: '32px 32px' } 
                        : {}}
                >
                    {/* --- HEADER --- */}
                    <div className="mb-10 flex flex-col md:flex-row md:items-center justify-between gap-6 glass-card p-6 md:p-8 rounded-[2rem]">
                        <div className="absolute top-[-50%] right-[-10%] w-64 h-64 bg-blue-400 rounded-full mix-blend-multiply filter blur-[80px] opacity-30 animate-pulse"></div>
                        <div className="absolute bottom-[-50%] left-[-10%] w-64 h-64 bg-purple-400 rounded-full mix-blend-multiply filter blur-[80px] opacity-30 animate-pulse" style={{ animationDelay: '2s' }}></div>

                        <div className="flex items-center gap-5 group cursor-pointer relative z-10">
                            <div className="p-4 bg-gradient-to-br from-blue-500 via-indigo-600 to-purple-600 rounded-[2rem] text-white shadow-xl shadow-blue-500/40 transform group-hover:scale-110 group-hover:-rotate-6 transition-all duration-500">
                                <Icon name="Activity" size={40} className="group-hover:animate-bounce" style={{ animationDuration: '2s' }} />
                            </div>
                            <div>
                                <h1 className="text-4xl md:text-5xl font-black uppercase tracking-tighter leading-none mb-3 bg-gradient-to-r from-slate-900 via-blue-800 to-slate-900 bg-clip-text text-transparent drop-shadow-sm group-hover:bg-gradient-to-r group-hover:from-blue-600 group-hover:via-purple-500 group-hover:to-pink-500 transition-all duration-700 animate-gradient-x">
                                    OEE Production <br className="hidden md:block" />
                                    <span className="text-3xl md:text-4xl bg-gradient-to-r from-slate-500 to-slate-400 bg-clip-text text-transparent">EN-Plating</span>
                                </h1>
                                <div className="flex items-center gap-3">
                                    <span className="text-[11px] font-black text-white uppercase tracking-widest bg-slate-800 px-3 py-1 rounded-full italic shadow-md">
                                        Interactive Dashboard
                                    </span>
                                    <span className="flex h-3 w-3 relative">
                                        <span className="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75"></span>
                                        <span className="relative inline-flex rounded-full h-3 w-3 bg-emerald-500"></span>
                                    </span>
                                </div>
                            </div>
                        </div>

                        <div className="flex flex-wrap items-center justify-end gap-4 relative z-10 mt-4 md:mt-0">
                            <button onClick={toggleFullscreen} className="flex items-center gap-2 bg-white border-2 border-slate-200 hover:border-blue-400 text-slate-700 hover:text-blue-600 px-6 py-4 rounded-2xl font-black text-xs transition-all duration-300 shadow-sm hover:shadow-xl hover:shadow-blue-500/20 active:scale-95 group">
                                <Icon name={isFullscreen ? "Minimize" : "Maximize"} size={20} className="group-hover:scale-110 transition-transform text-blue-500" /> {isFullscreen ? "ย่อหน้าจอ" : "เต็มจอ (FULLSCREEN)"}
                            </button>
                            {!isFullscreen && (
                                <>
                                    <button onClick={handleSaveData} className="flex items-center gap-2 bg-white border-2 border-slate-200 hover:border-emerald-400 text-slate-700 hover:text-emerald-600 px-6 py-4 rounded-2xl font-black text-xs transition-all duration-300 shadow-sm hover:shadow-xl hover:shadow-emerald-500/20 active:scale-95 group">
                                        <Icon name="Save" size={20} className="group-hover:-translate-y-1 transition-transform text-emerald-500" /> SAVE DATA
                                    </button>
                                    <input type="file" ref={fileInputRef} onChange={handleFileUpload} accept=".xlsx, .xls" className="hidden" />
                                    <button onClick={() => fileInputRef.current.click()} className="flex items-center gap-2 bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-500 hover:to-indigo-500 text-white px-8 py-4 rounded-2xl font-black text-xs transition-all duration-300 shadow-lg shadow-blue-500/30 hover:shadow-blue-500/50 active:scale-95 group">
                                        <Icon name="FileUp" size={20} className="group-hover:-translate-y-1 transition-transform" /> IMPORT XLSX
                                    </button>
                                </>
                            )}
                        </div>
                    </div>

                    {message && (
                        <div className={`fixed top-6 left-1/2 -translate-x-1/2 z-50 px-8 py-4 rounded-2xl shadow-2xl flex items-center gap-3 animate-bounce ${message.type === 'success' ? 'bg-slate-900 text-emerald-400 border border-emerald-900/50' : 'bg-red-600 text-white'}`}>
                            <Icon name={message.type === 'success' ? "CheckCircle2" : "AlertCircle"} size={20} />
                            <span className="font-black text-sm uppercase tracking-widest">{message.text}</span>
                        </div>
                    )}

                    {/* --- SUMMARY STATS (Reduced Size -30%) --- */}
                    <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-6 gap-6 mb-10 perspective-1000">
                        
                        {/* Card 1: OEE เดือน */}
                        <div className="glass-card shimmer-glass animate-fade-in-up group rounded-[1.5rem] p-5 border-t-4 border-t-blue-500" style={{ animationDelay: '100ms' }}>
                            <div className="text-[10px] font-black text-slate-500 uppercase tracking-wider mb-3 flex items-center gap-2 relative z-10">
                                <Icon name="CalendarDays" size={16} className="text-blue-500 group-hover:animate-spin-slow" /> OEE เดือน{selectedMonth}
                            </div>
                            <div className={`text-4xl font-black tracking-tighter relative z-10 ${currentData.monthlySummary.oee >= targets.oee ? 'text-emerald-500' : 'text-red-500'} group-hover:scale-105 transition-transform origin-left duration-500`}>
                                <AnimatedNumber value={currentData.monthlySummary.oee} formatter={toFixed2} />%
                            </div>
                            <div className="mt-4 flex items-center justify-between text-[10px] font-bold text-slate-400 bg-slate-100/50 backdrop-blur-sm px-2 py-1.5 rounded-xl border border-white/50 relative z-10">
                                <span>Target: {targets.oee}%</span>
                                <span className="text-blue-600 bg-blue-100 px-1.5 py-0.5 rounded-md">{selectedMonth}</span>
                            </div>
                        </div>

                        {/* Card 2: OEE Overall */}
                        <div className="glass-card shimmer-glass animate-fade-in-up group rounded-[1.5rem] p-5 border-t-4 border-t-emerald-500" style={{ animationDelay: '200ms' }}>
                            <div className="text-[10px] font-black text-slate-500 uppercase tracking-wider mb-3 flex items-center gap-2 relative z-10">
                                <Icon name="Globe" size={16} className="text-emerald-500" /> OEE Overall
                            </div>
                            <div className={`text-4xl font-black tracking-tighter relative z-10 ${overallOee >= targets.oee ? 'text-emerald-500' : 'text-red-500'} group-hover:scale-105 transition-transform origin-left duration-500`}>
                                <AnimatedNumber value={overallOee} formatter={toFixed2} />%
                            </div>
                            <div className="mt-4 flex items-center justify-between text-[10px] font-bold text-slate-400 bg-slate-100/50 backdrop-blur-sm px-2 py-1.5 rounded-xl border border-white/50 relative z-10">
                                <span>Target: {targets.oee}%</span>
                                <span className="text-emerald-600 bg-emerald-100 px-1.5 py-0.5 rounded-md">C15</span>
                            </div>
                        </div>

                        {/* Card 3: Total Output */}
                        <div className="glass-card shimmer-glass animate-fade-in-up group rounded-[1.5rem] p-5 border-t-4 border-t-amber-500" style={{ animationDelay: '300ms' }}>
                            <div className="text-[10px] font-black text-slate-500 uppercase tracking-wider mb-3 flex items-center gap-2 relative z-10">
                                <Icon name="Boxes" size={16} className="text-amber-500" /> Total Output
                            </div>
                            <div className="text-4xl font-black text-amber-500 tracking-tighter relative z-10 group-hover:scale-105 transition-transform origin-left duration-500">
                                <AnimatedNumber value={currentData.monthlySummary.output} formatter={formatNumber} />
                            </div>
                            <div className="mt-4 flex items-center justify-between text-[10px] font-bold text-slate-400 bg-slate-100/50 backdrop-blur-sm px-2 py-1.5 rounded-xl border border-white/50 relative z-10">
                                <span>Total PCS</span>
                                <span className="text-amber-600 bg-amber-100 px-1.5 py-0.5 rounded-md">Summary</span>
                            </div>
                        </div>

                        {/* Card 4: Total % NG */}
                        <div className="glass-card shimmer-glass animate-fade-in-up group rounded-[1.5rem] p-5 border-t-4 border-t-pink-500" style={{ animationDelay: '400ms' }}>
                            <div className="text-[10px] font-black text-slate-500 uppercase tracking-wider mb-3 flex items-center gap-2 relative z-10">
                                <Icon name="TrendingDown" size={16} className="text-pink-500" /> Total % NG
                            </div>
                            <div className={`text-4xl font-black tracking-tighter relative z-10 ${currentData.monthlySummary.ngRate <= targets.ng ? 'text-emerald-500' : 'text-red-500'} group-hover:scale-105 transition-transform origin-left duration-500`}>
                                <AnimatedNumber value={currentData.monthlySummary.ngRate} formatter={toFixed2} />%
                            </div>
                            <div className="mt-4 flex items-center justify-between text-[10px] font-bold text-slate-400 bg-slate-100/50 backdrop-blur-sm px-2 py-1.5 rounded-xl border border-white/50 relative z-10">
                                <span>Limit: {targets.ng}%</span>
                                <span className="text-pink-600 bg-pink-100 px-1.5 py-0.5 rounded-md">Yield Rate</span>
                            </div>
                        </div>

                        {/* Card 5: Total NG Qty */}
                        <div className="glass-card shimmer-glass animate-fade-in-up group rounded-[1.5rem] p-5 border-t-4 border-t-red-600" style={{ animationDelay: '500ms' }}>
                            <div className="text-[10px] font-black text-slate-500 uppercase tracking-wider mb-3 flex items-center gap-2 relative z-10">
                                <Icon name="AlertTriangle" size={16} className="text-red-600" /> Total NG Qty
                            </div>
                            <div className="text-4xl font-black text-red-600 tracking-tighter relative z-10 group-hover:scale-105 transition-transform origin-left duration-500">
                                <AnimatedNumber value={currentData.monthlySummary.ngQty} formatter={formatNumber} />
                            </div>
                            <div className="mt-4 flex items-center justify-between text-[10px] font-bold text-slate-400 bg-slate-100/50 backdrop-blur-sm px-2 py-1.5 rounded-xl border border-white/50 relative z-10">
                                <span>Reject PCS</span>
                                <span className="text-red-600 bg-red-100 px-1.5 py-0.5 rounded-md">Summary</span>
                            </div>
                        </div>

                        {/* Card 6: Total % NG Overall */}
                        <div className="glass-card shimmer-glass animate-fade-in-up group rounded-[1.5rem] p-5 border-t-4 border-t-orange-500" style={{ animationDelay: '600ms' }}>
                            <div className="text-[10px] font-black text-slate-500 uppercase tracking-wider mb-3 flex items-center gap-2 relative z-10">
                                <Icon name="Activity" size={16} className="text-orange-500" /> Total % NG Overall
                            </div>
                            <div className={`text-4xl font-black tracking-tighter relative z-10 ${overallNgRate <= targets.ng ? 'text-emerald-500' : 'text-red-600'} group-hover:scale-105 transition-transform origin-left duration-500`}>
                                <AnimatedNumber value={overallNgRate} formatter={toFixed2} />%
                            </div>
                            <div className="mt-4 flex items-center justify-between text-[10px] font-bold text-slate-400 bg-slate-100/50 backdrop-blur-sm px-2 py-1.5 rounded-xl border border-white/50 relative z-10">
                                <span>Limit: {targets.ng}%</span>
                                <span className="text-orange-600 bg-orange-100 px-1.5 py-0.5 rounded-md">P51</span>
                            </div>
                        </div>

                    </div>

                    {/* --- SECTION: CHART ZONE --- */}
                    <div className="bg-white/40 backdrop-blur-3xl p-6 md:p-8 rounded-[3rem] shadow-[0_8px_30px_rgb(0,0,0,0.04)] border border-white/50 mb-10 space-y-10">
                        
                        {/* 1. Daily OEE Trend (Full Width) */}
                        <div className="glass-card shimmer-glass p-8 rounded-[3rem] relative animate-fade-in-up" style={{ animationDelay: '300ms' }}>
                            <div className="absolute top-0 left-0 h-[4px] w-full bg-slate-800/10 rounded-t-[3rem] overflow-hidden z-20">
                                <div key={autoPlayIndex} className="h-full bg-gradient-to-r from-emerald-400 to-cyan-400 animate-scan-progress shadow-[0_0_10px_#10b981]"></div>
                            </div>
                            <div className="flex items-center gap-4 mb-8 bg-emerald-50/80 backdrop-blur-xl px-5 py-3 rounded-2xl w-fit border border-emerald-100 shadow-sm relative z-10">
                                <div className="p-2 bg-emerald-500 text-white rounded-xl"><Icon name="TrendingUp" size={20} /></div>
                                <h3 className="text-sm font-black text-emerald-700 uppercase tracking-widest">Daily OEE Trend ({selectedMonth})</h3>
                            </div>
                            <div className="h-[350px] w-full relative z-10">
                                <ResponsiveContainer width="100%" height="100%">
                                    <BarChart data={reversedDaily} margin={{ top: 20, right: 20, left: 0, bottom: 0 }} barSize={50}>
                                        <CartesianGrid strokeDasharray="3 3" vertical={false} stroke="#e2e8f0" strokeOpacity={0.6} />
                                        <XAxis dataKey="date" axisLine={false} tickLine={false} tick={{ fontSize: 10, fontWeight: 800, fill: '#64748b' }} dy={10} />
                                        <YAxis domain={[0, 110]} hide />
                                        <Tooltip cursor={{ fill: '#f8fafc' }} contentStyle={{ backgroundColor: 'rgba(255, 255, 255, 0.95)', backdropFilter: 'blur(16px)', borderRadius: '16px', border: '1px solid #e2e8f0', boxShadow: '0 10px 30px rgba(0,0,0,0.05)' }} />
                                        <ReferenceLine y={targets.oee} stroke="#ef4444" strokeDasharray="8 4" strokeWidth={1.5} label={{ position: 'right', value: `Target ${targets.oee}%`, fill: '#ef4444', fontSize: 10, fontWeight: 900 }} />
                                        <Bar dataKey="oee" radius={[12, 12, 4, 4]} animationDuration={1000}>
                                            {reversedDaily.map((entry, index) => (
                                                <Cell key={`cell-${index}`} fill={entry.oee >= targets.oee ? 'url(#barGreen3D)' : 'url(#barRed3D)'} opacity={index === dailyIndex ? 1 : 0.4} />
                                            ))}
                                            <LabelList dataKey="oee" content={(props) => renderDynamicBarLabel(props, dailyIndex, 'dailyOee', reversedDaily)} />
                                        </Bar>
                                    </BarChart>
                                </ResponsiveContainer>
                            </div>
                        </div>

                        {/* 2. Yearly OEE & Output (Full Width) */}
                        <div className="glass-card shimmer-glass p-8 rounded-[3rem] relative animate-fade-in-up" style={{ animationDelay: '400ms' }}>
                            <div className="absolute top-0 left-0 h-[4px] w-full bg-slate-800/10 rounded-t-[3rem] overflow-hidden z-20">
                                <div key={autoPlayIndex} className="h-full bg-gradient-to-r from-blue-400 to-indigo-400 animate-scan-progress shadow-[0_0_10px_#3b82f6]"></div>
                            </div>
                            <div className="flex items-center gap-4 mb-8 bg-blue-50/80 backdrop-blur-xl px-5 py-3 rounded-2xl w-fit border border-blue-100 shadow-sm relative z-10">
                                <div className="p-2 bg-blue-600 text-white rounded-xl shadow-lg shadow-blue-500/30"><Icon name="BarChart2" size={20} /></div>
                                <h3 className="text-sm font-black text-blue-700 uppercase tracking-widest">% OEE & Output Yearly Analysis</h3>
                            </div>
                            <div className="h-[450px] w-full relative z-10">
                                <ResponsiveContainer width="100%" height="100%">
                                    <ComposedChart data={yearlyOeeData} margin={{ top: 20, right: 30, left: 10, bottom: 10 }}>
                                        <defs>
                                            <linearGradient id="barGreen3D" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor="#10b981" /><stop offset="100%" stopColor="#047857" /></linearGradient>
                                            <linearGradient id="barRed3D" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor="#ef4444" /><stop offset="100%" stopColor="#991b1b" /></linearGradient>
                                            <linearGradient id="areaOutput" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor="#f59e0b" stopOpacity={0.25} /><stop offset="100%" stopColor="#f59e0b" stopOpacity={0} /></linearGradient>
                                        </defs>
                                        <CartesianGrid strokeDasharray="3 3" vertical={false} stroke="#cbd5e1" strokeOpacity={0.4} />
                                        <XAxis dataKey="shortName" axisLine={false} tickLine={false} tick={{ fontSize: 11, fontWeight: 900, fill: '#475569' }} dy={10} />
                                        <YAxis yAxisId="left" domain={[0, 110]} hide />
                                        <YAxis yAxisId="right" orientation="right" hide />
                                        <Tooltip cursor={{ fill: 'rgba(241, 245, 249, 0.4)' }} contentStyle={{ backgroundColor: 'rgba(255, 255, 255, 0.95)', backdropFilter: 'blur(10px)', borderRadius: '20px', border: '1px solid #e2e8f0', boxShadow: '0 15px 35px rgba(0,0,0,0.1)' }} />
                                        <Legend verticalAlign="top" align="right" iconType="circle" wrapperStyle={{ fontSize: '12px', fontWeight: '900', paddingBottom: '20px' }} />
                                        <ReferenceLine yAxisId="left" y={targets.oee} stroke="#f43f5e" strokeDasharray="6 4" strokeWidth={2} label={{ position: 'top', value: `Target OEE ${targets.oee}%`, fill: '#f43f5e', fontSize: 11, fontWeight: 900 }} />
                                        
                                        {/* Background Glow Area for Line */}
                                        <Area yAxisId="right" type="monotone" dataKey="output" fill="url(#areaOutput)" stroke="none" />
                                        
                                        <Bar yAxisId="left" dataKey="oee" name="OEE (%)" radius={[12, 12, 0, 0]} maxBarSize={60}>
                                            {yearlyOeeData.map((entry, index) => (
                                                <Cell key={`cell-${index}`} fill={entry.oee >= targets.oee ? 'url(#barGreen3D)' : 'url(#barRed3D)'} opacity={index === yearlyOeeIndex ? 1 : 0.4} />
                                            ))}
                                            <LabelList dataKey="oee" content={(props) => renderDynamicBarLabel(props, yearlyOeeIndex, 'oee', yearlyOeeData)} />
                                        </Bar>
                                        
                                        <Line 
                                            yAxisId="right" 
                                            type="monotone" 
                                            dataKey="output" 
                                            name="Output Volume" 
                                            stroke="#f59e0b" 
                                            strokeWidth={5} 
                                            dot={(props) => renderCustomDot(props, yearlyOeeIndex, '#f59e0b')}
                                            activeDot={{ r: 10, fill: '#f59e0b', stroke: '#fff', strokeWidth: 4 }}
                                            className="chart-glow"
                                        />
                                    </ComposedChart>
                                </ResponsiveContainer>
                            </div>
                        </div>

                        {/* 3. Yearly NG Plating Analysis (Full Width) */}
                        <div className="glass-card shimmer-glass p-8 rounded-[3rem] relative animate-fade-in-up" style={{ animationDelay: '500ms' }}>
                            <div className="absolute top-0 left-0 h-[4px] w-full bg-slate-800/10 rounded-t-[3rem] overflow-hidden z-20">
                                <div key={autoPlayIndex} className="h-full bg-gradient-to-r from-purple-400 to-pink-400 animate-scan-progress shadow-[0_0_10px_#d946ef]"></div>
                            </div>
                            <div className="flex items-center gap-4 mb-8 bg-purple-50/80 backdrop-blur-xl px-5 py-3 rounded-2xl w-fit border border-purple-100 shadow-sm relative z-10">
                                <div className="p-2 bg-purple-600 text-white rounded-xl shadow-lg shadow-purple-500/30"><Icon name="ActivitySquare" size={20} /></div>
                                <h3 className="text-sm font-black text-purple-700 uppercase tracking-widest">Total NG Plating Trend & Rate</h3>
                            </div>
                            <div className="h-[450px] w-full relative z-10">
                                <ResponsiveContainer width="100%" height="100%">
                                    <ComposedChart data={annualChartData} margin={{ top: 20, right: 30, left: 10, bottom: 10 }}>
                                        <defs>
                                            <linearGradient id="barNg3D" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor="#d946ef" /><stop offset="100%" stopColor="#701a75" /></linearGradient>
                                            <linearGradient id="barNgTotal3D" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor="#6366f1" /><stop offset="100%" stopColor="#312e81" /></linearGradient>
                                            <linearGradient id="areaNgRate" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor="#ec4899" stopOpacity={0.2} /><stop offset="100%" stopColor="#ec4899" stopOpacity={0} /></linearGradient>
                                        </defs>
                                        <CartesianGrid strokeDasharray="3 3" vertical={false} stroke="#cbd5e1" strokeOpacity={0.4} />
                                        <XAxis dataKey="shortName" axisLine={false} tickLine={false} tick={{ fontSize: 11, fontWeight: 900, fill: '#475569' }} dy={10} />
                                        <YAxis yAxisId="left" hide />
                                        <YAxis yAxisId="right" orientation="right" hide />
                                        <Tooltip cursor={{ fill: 'rgba(241, 245, 249, 0.4)' }} contentStyle={{ backgroundColor: 'rgba(255, 255, 255, 0.95)', backdropFilter: 'blur(10px)', borderRadius: '20px', border: '1px solid #e2e8f0', boxShadow: '0 15px 35px rgba(0,0,0,0.1)' }} />
                                        <Legend verticalAlign="top" align="right" iconType="circle" wrapperStyle={{ fontSize: '12px', fontWeight: '900', paddingBottom: '20px' }} />
                                        <ReferenceLine yAxisId="right" y={targets.ng} stroke="#ef4444" strokeDasharray="10 5" strokeWidth={2} label={{ position: 'top', value: `Limit ${targets.ng}%`, fill: '#ef4444', fontSize: 11, fontWeight: 900 }} />
                                        
                                        <Area yAxisId="right" type="monotone" dataKey="ngRate" fill="url(#areaNgRate)" stroke="none" />

                                        <Bar yAxisId="left" dataKey="ngQty" name="NG Quantity" radius={[12, 12, 0, 0]} maxBarSize={60}>
                                            {annualChartData.map((entry, index) => (
                                                <Cell key={`cell-${index}`} fill={entry.isTotal ? 'url(#barNgTotal3D)' : 'url(#barNg3D)'} opacity={index === yearlyNgIndex ? 1 : 0.4} />
                                            ))}
                                            <LabelList dataKey="ngQty" content={(props) => renderDynamicBarLabel(props, yearlyNgIndex, 'ngQty', annualChartData)} />
                                        </Bar>
                                        <Line 
                                            yAxisId="right" 
                                            type="monotone" 
                                            dataKey="ngRate" 
                                            name="NG Rate (%)" 
                                            stroke="#ec4899" 
                                            strokeWidth={5} 
                                            dot={(props) => renderCustomDot(props, yearlyNgIndex, '#ec4899')}
                                            activeDot={{ r: 10, fill: '#ec4899', stroke: '#fff', strokeWidth: 4 }}
                                            className="chart-glow"
                                        />
                                    </ComposedChart>
                                </ResponsiveContainer>
                            </div>
                        </div>

                        {/* 4. NG Distribution Pie (Centered) */}
                        <div className="flex justify-center mt-12">
                            <div className="w-full max-w-[1000px] bg-slate-900 border border-slate-700 shadow-[0_30px_60px_rgba(0,0,0,0.5)] p-10 md:p-14 rounded-[4rem] relative overflow-hidden flex flex-col animate-fade-in-up">
                                <div className="absolute top-0 left-0 h-[4px] w-full bg-slate-800/50 rounded-t-[4rem] overflow-hidden z-20">
                                    <div key={pieAutoPlayIndex} className="h-full bg-gradient-to-r from-rose-400 to-orange-400 animate-scan-progress-pie"></div>
                                </div>
                                <div className="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[350px] h-[350px] border border-slate-700/50 rounded-full animate-pulse-ring pointer-events-none"></div>
                                <div className="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[600px] h-[600px] rounded-full radar-bg pointer-events-none opacity-20"></div>
                                
                                <div className="flex items-center gap-4 mb-4 relative z-20 bg-slate-800/60 backdrop-blur w-fit p-3 pr-6 rounded-2xl border border-slate-700">
                                    <div className="p-3 bg-gradient-to-br from-rose-500 to-orange-600 text-white rounded-xl"><Icon name="PieChart" size={24} /></div>
                                    <div>
                                        <h3 className="text-lg font-black text-white uppercase tracking-widest leading-tight">NG Type Distribution</h3>
                                        <p className="text-[10px] text-slate-400 font-bold uppercase tracking-widest mt-0.5 italic">Monthly Breakdown: {selectedMonth}</p>
                                    </div>
                                </div>
                                
                                <div className="flex-1 w-full min-h-[500px] relative z-10">
                                    {pieData.length > 0 ? (
                                        <ResponsiveContainer width="100%" height="100%">
                                            <PieChart>
                                                <Pie
                                                    activeIndex={pieIndex}
                                                    activeShape={renderActivePieShape}
                                                    data={pieData}
                                                    cx="50%" cy="50%"
                                                    innerRadius={110} outerRadius={170}
                                                    paddingAngle={4}
                                                    dataKey="value"
                                                    animationDuration={1500}
                                                >
                                                    {pieData.map((entry, index) => {
                                                        const distinctPieColors = ['#ef4444', '#3b82f6', '#10b981', '#f59e0b', '#8b5cf6', '#06b6d4', '#f97316', '#ec4899', '#84cc16'];
                                                        return <Cell key={`cell-${index}`} fill={distinctPieColors[index % distinctPieColors.length]} opacity={index === pieIndex ? 1 : 0.4} stroke={index === pieIndex ? '#fff' : 'none'} strokeWidth={3} />;
                                                    })}
                                                </Pie>
                                                <Tooltip formatter={(value, name) => [formatNumber(value) + ' Pcs.', name]} contentStyle={{ backgroundColor: 'rgba(15, 23, 42, 0.9)', backdropFilter: 'blur(10px)', border: '1px solid #334155', borderRadius: '16px', color: '#fff' }} />
                                                <Legend layout="horizontal" verticalAlign="bottom" align="center" wrapperStyle={{ fontSize: '11px', fontWeight: 'bold', color: '#94a3b8', paddingTop: '30px' }} />
                                            </PieChart>
                                        </ResponsiveContainer>
                                    ) : (
                                        <div className="flex flex-col items-center justify-center h-full text-slate-500 text-sm font-bold uppercase tracking-widest gap-4 italic opacity-50">
                                            <Icon name="Inbox" size={40} />
                                            No Rejection Data for {selectedMonth}
                                        </div>
                                    )}
                                </div>
                            </div>
                        </div>

                    </div>

                    {/* --- DATA ENTRY & SETTINGS --- */}
                    {!isFullscreen && (
                        <div className="mb-10 bg-white/60 backdrop-blur-xl p-6 md:p-8 rounded-[2.5rem] shadow-sm border border-white overflow-hidden transition-all duration-300">
                            <div className={`flex items-center justify-between cursor-pointer group ${showInputPanel ? 'mb-8 border-b border-slate-200/60 pb-5' : ''}`} onClick={() => setShowInputPanel(!showInputPanel)}>
                                <div className="flex items-center gap-3">
                                    <div className="p-2 bg-amber-100 rounded-xl text-amber-500"><Icon name="SlidersHorizontal" size={24} /></div>
                                    <h2 className="text-lg font-black text-slate-800 uppercase italic">แผงจัดการข้อมูล (Input Panel)</h2>
                                </div>
                                <button className="flex items-center gap-2 text-xs font-black text-slate-500 bg-white shadow-sm px-4 py-2 rounded-full border border-slate-200 hover:border-amber-300 hover:text-amber-500 transition-all">
                                    {showInputPanel ? <><Icon name="EyeOff" size={16} /> ซ่อนแผงข้อมูล</> : <><Icon name="Eye" size={16} /> แสดงแผงข้อมูล</>}
                                </button>
                            </div>
                            
                            {showInputPanel && (
                                <div className="grid grid-cols-1 lg:grid-cols-12 gap-10">
                                    <div className="lg:col-span-8">
                                        <h3 className="text-[10px] font-black text-slate-400 uppercase tracking-[0.2em] mb-4 flex items-center gap-2"><Icon name="Calendar" size={14} /> ตารางสรุป 12 เดือน</h3>
                                        <div className="overflow-x-auto custom-scrollbar">
                                            <table className="w-full text-left min-w-[700px]">
                                                <thead>
                                                    <tr className="text-[10px] font-black text-slate-400 uppercase tracking-widest italic border-b-2 border-slate-200/60">
                                                        <th className="pb-3 pl-2">เดือน</th>
                                                        <th className="pb-3 text-center">OEE (%)</th>
                                                        <th className="pb-3 text-center">Output (Pcs)</th>
                                                        <th className="pb-3 text-center">NG (Qty)</th>
                                                        <th className="pb-3 text-center">NG (%)</th>
                                                        <th className="pb-3 text-right pr-2">เลือก</th>
                                                    </tr>
                                                </thead>
                                                <tbody>
                                                    {months.map((m, idx) => (
                                                        <tr key={idx} className={`border-b border-slate-100 transition-all duration-300 ${selectedMonth === m ? 'bg-blue-50/80 shadow-inner' : 'hover:bg-slate-50'}`}>
                                                            <td className="py-2 pl-2">
                                                                <span className={`text-xs font-black ${selectedMonth === m ? 'text-blue-600' : 'text-slate-600'}`}>{m}</span>
                                                            </td>
                                                            <td className="py-1 text-center"><input type="number" step="0.01" value={fullYearData[m].monthlySummary.oee} onChange={(e) => updateSpecificMonthData(m, 'oee', e.target.value)} className="w-16 bg-white border border-slate-200 rounded-lg px-2 py-1 text-[11px] font-black text-blue-600 text-center outline-none focus:ring-2 focus:ring-blue-400 transition-all shadow-sm" /></td>
                                                            <td className="py-1 text-center"><input type="number" value={fullYearData[m].monthlySummary.output} onChange={(e) => updateSpecificMonthData(m, 'output', e.target.value)} className="w-24 bg-white border border-slate-200 rounded-lg px-2 py-1 text-[11px] font-black text-indigo-600 text-center outline-none focus:ring-2 focus:ring-indigo-400 transition-all shadow-sm" /></td>
                                                            <td className="py-1 text-center"><input type="number" value={fullYearData[m].monthlySummary.ngQty} onChange={(e) => updateSpecificMonthData(m, 'ngQty', e.target.value)} className="w-16 bg-white border border-slate-200 rounded-lg px-2 py-1 text-[11px] font-black text-rose-500 text-center outline-none focus:ring-2 focus:ring-rose-400 transition-all shadow-sm" /></td>
                                                            <td className="py-1 text-center"><input type="number" step="0.01" value={fullYearData[m].monthlySummary.ngRate} onChange={(e) => updateSpecificMonthData(m, 'ngRate', e.target.value)} className="w-16 bg-white border border-slate-200 rounded-lg px-2 py-1 text-[11px] font-black text-rose-600 text-center outline-none focus:ring-2 focus:ring-rose-400 transition-all shadow-sm" /></td>
                                                            <td className="py-1 text-right pr-2"><button onClick={() => setSelectedMonth(m)} className={`p-1.5 rounded-xl transition-all ${selectedMonth === m ? 'bg-blue-600 text-white shadow-md shadow-blue-500/30 scale-110' : 'bg-white border border-slate-200 text-slate-400 hover:text-blue-600 hover:border-blue-200'}`}><Icon name="MousePointer2" size={14} /></button></td>
                                                        </tr>
                                                    ))}
                                                </tbody>
                                            </table>
                                        </div>
                                    </div>

                                    <div className="lg:col-span-4 bg-white/50 backdrop-blur p-6 rounded-3xl border border-white shadow-sm">
                                        <h3 className="text-[10px] font-black text-slate-400 uppercase tracking-[0.2em] mb-6 flex items-center gap-2 italic"><Icon name="Activity" size={14} /> ข้อมูลรายวัน ({selectedMonth})</h3>
                                        <div className="space-y-4">
                                            {currentData.dailyData.map((day, idx) => (
                                                <div key={idx} className="bg-white p-4 rounded-2xl border border-slate-100 shadow-sm transition-all hover:shadow-md hover:border-blue-200 group">
                                                    <input 
                                                        type={day.date && day.date.includes('-') && day.date.length === 10 ? "date" : "text"} 
                                                        value={day.date} 
                                                        placeholder="ระบุ วัน/เดือน/ปี" 
                                                        onDoubleClick={(e) => { e.target.type = 'date'; try { e.target.showPicker(); } catch(err) {} }}
                                                        onBlur={(e) => { if (!e.target.value || !e.target.value.includes('-')) e.target.type = 'text'; }}
                                                        onChange={(e) => { const newDaily = [...currentData.dailyData]; newDaily[idx].date = e.target.value; setFullYearData(prev => ({...prev, [selectedMonth]: {...prev[selectedMonth], dailyData: newDaily}})); }} 
                                                        className="text-[11px] font-black text-slate-500 block mb-3 uppercase tracking-widest outline-none bg-slate-50 px-3 py-1.5 rounded-full w-full focus:bg-blue-50 focus:text-blue-600 transition-colors cursor-pointer hover:bg-slate-100"
                                                    />
                                                    <div className="grid grid-cols-2 gap-4">
                                                        <div><span className="text-[9px] font-black text-slate-400 uppercase">OEE %</span><input type="number" step="0.01" value={day.oee} onChange={(e) => updateDailyData(idx, 'oee', e.target.value)} className="w-full bg-slate-50 border border-slate-200 rounded-xl px-3 py-2 text-xs font-black text-blue-600 outline-none focus:border-blue-400 focus:bg-white transition-all" /></div>
                                                        <div><span className="text-[9px] font-black text-slate-400 uppercase">Output</span><input type="number" value={day.output} onChange={(e) => updateDailyData(idx, 'output', e.target.value)} className="w-full bg-slate-50 border border-slate-200 rounded-xl px-3 py-2 text-xs font-black text-indigo-600 outline-none focus:border-indigo-400 focus:bg-white transition-all" /></div>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                </div>
                            )}
                        </div>
                    )}

                    <div className="mt-8 text-center">
                        <div className="inline-flex items-center gap-3 px-8 py-3 bg-white/60 backdrop-blur-md rounded-full text-slate-500 text-[10px] font-black uppercase tracking-[0.3em] border border-white shadow-sm hover:scale-105 transition-transform cursor-default italic">
                            <Icon name="Zap" size={14} className="text-amber-500 animate-pulse" /> EN Plating Solero Division • Advanced Dashboard Experience
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
